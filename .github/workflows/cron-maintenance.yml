name: Cron Maintenance (알림·분석·정리)

on:
  # 매일 KST 11:05 (UTC 02:05) — 정각 혼잡 회피
  schedule:
    - cron: "5 2 * * *"
  # 수동 실행 허용
  workflow_dispatch:

jobs:
  maintenance:
    name: Process Alerts + Rebuild Analysis + Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger cron-maintenance
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Starting cron-maintenance at $(date -u '+%Y-%m-%d %H:%M:%S UTC')..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "https://bid-platform.vercel.app/api/jobs/cron-maintenance")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 207 ]; then
            echo "cron-maintenance failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "cron-maintenance completed successfully"
