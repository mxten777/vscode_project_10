name: Monthly Model Retrain

on:
  # 매월 1일 UTC 02:00 (KST 11:00) 자동 실행
  schedule:
    - cron: "0 2 1 * *"
  # 수동 실행 허용
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"

jobs:
  retrain:
    name: Retrain Bid Rate Model
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger model retrain via AI Service API
        env:
          AI_SERVICE_URL: ${{ secrets.AI_SERVICE_URL }}
          AI_SERVICE_API_KEY: ${{ secrets.AI_SERVICE_API_KEY }}
        run: |
          echo "Triggering model retrain..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${AI_SERVICE_API_KEY}" \
            "${AI_SERVICE_URL}/train/bid-rate")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Retrain failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "Retrain completed successfully"

      - name: Check model status
        env:
          AI_SERVICE_URL: ${{ secrets.AI_SERVICE_URL }}
          AI_SERVICE_API_KEY: ${{ secrets.AI_SERVICE_API_KEY }}
        run: |
          curl -s \
            -H "x-api-key: ${AI_SERVICE_API_KEY}" \
            "${AI_SERVICE_URL}/train/model-status" | python3 -m json.tool

      - name: Trigger batch embedding update
        env:
          NEXT_APP_URL: ${{ secrets.NEXT_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering batch embedding update..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${NEXT_APP_URL}/api/ai/embed-batch")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
